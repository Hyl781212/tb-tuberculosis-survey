
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>传染病消毒剂配制计算器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,body{
            overflow-x: hidden;
        }
        body {
            font-family: "Microsoft Yahei", 微软雅黑;
            width: 100%;
            max-width: 480px;
            margin: 15px auto;
            padding: 15px;
            background: #fff;
            border: 1px solid #dce4ee;
            border-radius: 10px;
            box-shadow: 3px 3px 12px rgba(0,0,0.08);
        }
        h3 {
            text-align: center;
            color: #005a9c;
            font-size: clamp(18px,4vw,22px);
            margin-bottom: 8px;
        }
        .header-wrap {
            position: relative;
            margin: 8px 0 18px;
        }
        .header-row{
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 4px;
            color: #666;
            font-size: clamp(12px,3vw,14px);
            position: relative;
            z-index: 2;
            background: #fff;
            padding: 0 10px;
            width: fit-content;
            margin: 0 auto;
        }
        .divider-line{
            width: 100%;
            height: 1px;
            background-color: #cccccc;
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }
        .row-item{
            display: flex;
            margin: 10px 0;
            align-items: center;
            flex-wrap: nowrap;
            width: 100%;
            gap: 4px;
        }
        .title-label {
            color: #005a9c;
            font-weight: bold;
            font-size: clamp(12px,3vw,14px);
            width: 80px;
            min-width: 80px;
            white-space: nowrap;
            margin-right: 4px;
        }
        label {
            display: inline-block;
            color: #333;
            font-weight: 500;
            white-space: nowrap;
            font-size: clamp(12px,3vw,14px);
        }
        .wall-align-label {
            color: #000;
            font-size: clamp(12px,3vw,14px);
            margin-left: 86px;
        }
        select, input {
            padding: 8px 10px;
            font-size: clamp(12px,3vw,14px);
            border: 1px solid #b8c8dc;
            outline: none;
            flex-shrink: 1;
        }
        #disinfectObj {
            width: 32%;
            min-width: 120px;
        }
        #inputVal{
            width: 28%;
            min-width: 100px;
        }
        #len {
            width: 24%;
            min-width: 80px;
        }
        #wid{
            width: 24%;
            min-width: 80px;
        }
        #wallType {
            width: 26%;
            min-width: 85px;
        }
        #wallDose {
            width: 22%;
            min-width: 75px;
        }
        #origConc{
            width: 55px;
            min-width: 45px;
        }
        #targetEnv{
            width: 18%;
            min-width: 75px;
        }
        .btn-row{
            display: flex;
            gap: 8px;
            margin: 18px 0;
            width: 100%;
        }
        .btn-row button{
            flex:1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: clamp(14px,3vw,16px);
            cursor: pointer;
            font-weight: 500;
        }
        #calcBtn {
            background: #005a9c;
            color: #fff;
        }
        #resetBtn {
            background: #dc3545;
            color: #fff;
        }
        #convertBtn {
            background: #28a745;
            color: #fff;
        }
        input:focus, select:focus {
            border-color: #005a9c;
        }
        .res {
            margin-top: 15px;
            padding: 15px;
            background: #f7fafe;
            border-radius: 8px;
            font-size: clamp(12px,3vw,14px);
            line-height: 1.8;
        }
        .res p {
            margin: 6px 0;
        }
        .num-normal{
            color:#000;
            font-weight:normal;
        }
        strong {
            color: #c00000;
            font-weight: bold;
        }
        .blue-title{
            color: #005a9c;
            font-weight: bold;
        }
        .tip-desc{
            margin-top:12px;
            padding:10px;
            background:#f5f9ff;
            border-radius:6px;
            font-size:13px;
            line-height:1.7;
            color:#333;
        }
        .bottom-info{
            margin-top: 5px;
            text-align: center;
            color: #668cb3;
            font-size: clamp(10px,2.5vw,12px);
            font-weight: normal;
            padding-top: 12px;
            border-top: 1px dashed #eee;
        }
    </style>
</head>
<body>
    <h3>传染病消毒剂配制计算器</h3>
    <div class="header-wrap">
        <div class="divider-line"></div>
        <div class="header-row">
            <span>消毒剂名称：次氯酸钠(84)</span>
            <span> </span>
            <label>原液浓度(%)</label>
            <input type="number" id="origConc" value="5" min="0.1" step="0.1">
        </div>
    </div>

    <div class="row-item">
        <div class="title-label">消毒对象：</div>
        <select id="disinfectObj">
            <option value="sputum">痰液(ml)</option>
            <option value="fabricWater">物表(L)</option>
            <option value="tablewareWater">餐具(L)</option>
            <option value="cleanWater">清洁用具(L)</option>
            <option value="rubWater">垃圾(L)</option>
            <option value="vomit">呕吐物(ml)</option>
            <option value="feces">大便(ml)</option>
            <option value="urine">小便(ml)</option>
            <option value="sewage">生活污水(L)</option>
            <option value="bodyWater">遗体(L)</option>
        </select>
        <span>，</span>
        <input type="number" id="inputVal" placeholder="请先选择消毒对象">
    </div>

    <div class="row-item">
        <div class="title-label">室内消毒：</div>
        <label>长度</label>
        <input type="number" id="len" placeholder="输入米">
        <label>；宽度</label>
        <input type="number" id="wid" placeholder="输入米">
    </div>
    <div class="row-item">
        <label class="title-label"></label>
        <label>墙面</label>
        <select id="wallType">
            <option value="none">不消毒</option>
            <option value="soil">泥土</option>
            <option value="other">水泥、木板、石灰</option>
            <option value="tile">瓷砖</option>
        </select>
        <label>，用量</label>
        <input type="text" id="wallDose">
    </div>
    <div class="row-item">
        <label class="wall-align-label">作用浓度(mg/L)</label>
        <input type="number" id="targetEnv" value="1000" min="100" max="99999">
    </div>

    <div class="btn-row">
        <button id="calcBtn" onclick="calcAll()">计算</button>
        <button id="resetBtn" onclick="resetAll()">重置</button>
        <button id="convertBtn">ml/L转换</button>
    </div>

    <div class="res" id="result"></div>

    <div class="tip-desc" id="tipInfo">
操作说明：
1.原液浓度：默认值是5%，可重新输入数值；
2.消毒对象：选择污染物类型，填写消毒液或污染物体积；
3.室内消毒：长度、宽度输入框填写米数，墙面下拉框选择材质，用量自动匹配，作用浓度默认值1000mg/L，用量及作用浓度输入框可手动输入修改数值；
4.填完数据点【计算】出配比，【重置】清空恢复初始，【ml/L转换】对计算结果的单位进行ml和L的转换。
    </div>

    <div class="bottom-info">恩施市疾病预防控制中心</div>

<script>
let useAutoUnit = true;
let cacheSputum = 0, cacheSputumW = 0;
let cacheFabric = 0, cacheFabricW = 0;
let cacheTable = 0, cacheTableW = 0;
let cacheClean = 0, cacheCleanW = 0;
let cacheRub = 0, cacheRubW = 0;
let cacheVomit = 0, cacheVomitW = 0;
let cacheFeces = 0, cacheFecesW = 0;
let cacheUrine = 0, cacheUrineW = 0;
let cacheSewage = 0, cacheSewageW = 0;
let cacheBody = 0, cacheBodyW = 0;
let cacheRoom = 0, cacheRoomW = 0;
let targetConc = 0;

function formatNum(num) {
    let n = parseFloat(num) || 0;
    let fixed = n.toFixed(1);
    return fixed.endsWith('.0') ? parseInt(fixed) : fixed;
}

document.getElementById('convertBtn').addEventListener('click', function () {
    useAutoUnit = !useAutoUnit;
    renderAllResult();
});

document.getElementById('wallType').addEventListener('change', function () {
    const val = this.value;
    const doseInput = document.getElementById('wallDose');
    if (val === 'none') {
        doseInput.value = '';
    } else if (val === 'soil') {
        doseInput.value = '200ml/m²';
    } else if (val === 'other') {
        doseInput.value = '100ml/m²';
    } else if (val === 'tile') {
        doseInput.value = '50ml/m²';
    }
});
document.getElementById('wallType').dispatchEvent(new Event('change'));

document.getElementById('disinfectObj').addEventListener('change', function () {
    const val = this.value;
    const input = document.getElementById('inputVal');
    switch (val) {
        case 'sputum': input.placeholder = "输入痰液量(ml)"; break;
        case 'vomit': input.placeholder = "输入呕吐物量(ml)"; break;
        case 'feces': input.placeholder = "输入大便量(ml)"; break;
        case 'urine': input.placeholder = "输入小便量(ml)"; break;
        case 'sewage': input.placeholder = "输入污水量(L)"; break;
        default: input.placeholder = "输入消毒液量(L)";
    }
});
document.getElementById('disinfectObj').dispatchEvent(new Event('change'));

function getUnitText(num) {
    num = parseFloat(num) || 0;
    let val, unit;
    if (useAutoUnit) {
        if (num >= 1000) {
            val = num / 1000;
            unit = 'L';
        } else {
            val = num;
            unit = 'ml';
        }
    } else {
        if (num >= 1000) {
            val = num;
            unit = 'ml';
        } else {
            val = num / 1000;
            unit = 'L';
        }
    }
    return [formatNum(val), unit];
}

function renderAllResult() {
    const obj = document.getElementById('disinfectObj').value;
    const val = parseFloat(document.getElementById('inputVal').value) || 0;
    const L = parseFloat(document.getElementById('len').value) || 0;
    const W = parseFloat(document.getElementById('wid').value) || 0;
    const wallType = document.getElementById('wallType').value;
    const conc = targetConc;

    const groundArea = L * W;
    const wallArea = wallType !== 'none' ? 2 * (L + W) * 2 : 0;
    const totalArea = groundArea + wallArea;

    let html = "";

    if (obj === 'sputum' && val > 0) {
        let s = getUnitText(cacheSputum), w = getUnitText(cacheSputumW);
        html += `<p><span class="blue-title">【痰液消毒】</span>作用浓度<span class="num-normal">${conc}mg/L</span>，原液 <strong>${s[0]} ${s[1]}</strong>，加水 <strong>${w[0]} ${s[1]}</strong>；浸泡静置，作用时间2小时</p>`;
    }
    if (obj === 'fabricWater' && val > 0) {
        let s = getUnitText(cacheFabric), w = getUnitText(cacheFabricW);
        html += `<p><span class="blue-title">【物表消毒】</span>作用浓度<span class="num-normal">${conc}mg/L</span>，原液 <strong>${s[0]} ${s[1]}</strong>，加水 <strong>${w[0]} ${w[1]}</strong>；擦拭或喷洒，作用时间60分钟</p>`;
    }
    if (obj === 'tablewareWater' && val > 0) {
        let s = getUnitText(cacheTable), w = getUnitText(cacheTableW);
        html += `<p><span class="blue-title">【餐具消毒】</span>作用浓度<span class="num-normal">${conc}mg/L</span>，原液 <strong>${s[0]} ${s[1]}</strong>，加水 <strong>${w[0]} ${w[1]}</strong>；浸泡，作用时间30分钟</p>`;
    }
    if (obj === 'cleanWater' && val > 0) {
        let s = getUnitText(cacheClean), w = getUnitText(cacheCleanW);
        html += `<p><span class="blue-title">【清洁用具消毒】</span>作用浓度<span class="num-normal">${conc}mg/L</span>，原液 <strong>${s[0]} ${s[1]}</strong>，加水 <strong>${w[0]} ${w[1]}</strong>；浸泡，作用时间30分钟</p>`;
    }
    if (obj === 'rubWater' && val > 0) {
        let s = getUnitText(cacheRub), w = getUnitText(cacheRubW);
        html += `<p><span class="blue-title">【垃圾消毒】</span>作用浓度<span class="num-normal">${conc}mg/L</span>，原液 <strong>${s[0]} ${s[1]}</strong>，加水 <strong>${w[0]} ${w[1]}</strong>；喷洒浸透，作用时间60分钟</p>`;
    }
    if (obj === 'vomit' && val > 0) {
        let s = getUnitText(cacheVomit), w = getUnitText(cacheVomitW);
        html += `<p><span class="blue-title">【呕吐物消毒】</span>作用浓度<span class="num-normal">${conc}mg/L</span>，原液 <strong>${s[0]} ${s[1]}</strong>，加水 <strong>${w[0]} ${w[1]}</strong>；搅匀静置，作用时间2小时</p>`;
    }
    if (obj === 'feces' && val > 0) {
        let s = getUnitText(cacheFeces), w = getUnitText(cacheFecesW);
        if (cacheFecesW <= 0) {
            html += `<p><span class="blue-title">【大便消毒】</span>作用浓度<span class="num-normal">${conc}mg/L</span>，加入原液 <strong>${s[0]} ${s[1]}</strong>；搅匀静置，作用时间2小时</p>`;
        } else {
            html += `<p><span class="blue-title">【大便消毒】</span>作用浓度<span class="num-normal">${conc}mg/L</span>，加入原液 <strong>${s[0]} ${s[1]}</strong>，加水 <strong>${w[0]} ${w[1]}</strong>；搅匀静置，作用时间2小时</p>`;
        }
    }
    if (obj === 'urine' && val > 0) {
        let s = getUnitText(cacheUrine), w = getUnitText(cacheUrineW);
        html += `<p><span class="blue-title">【小便消毒】</span>作用浓度<span class="num-normal">${conc}mg/L</span>，原液 <strong>${s[0]} ${s[1]}</strong>，加水 <strong>${w[0]} ${w[1]}</strong>；搅匀静置，作用时间2小时</p>`;
    }
    if (obj === 'sewage' && val > 0) {
        let s = getUnitText(cacheSewage);
        html += `<p><span class="blue-title">【生活污水消毒】</span>作用浓度<span class="num-normal">${conc}mg/L</span>，加入原液 <strong>${s[0]} ${s[1]}</strong>；搅匀静置，作用时间1.5小时，检查余氯大于6.5mg/L时才可排放。</p>`;
    }
    if (obj === 'bodyWater' && val > 0) {
        let s = getUnitText(cacheBody), w = getUnitText(cacheBodyW);
        html += `<p><span class="blue-title">【遗体消毒】</span>作用浓度<span class="num-normal">${conc}mg/L</span>，原液 <strong>${s[0]} ${s[1]}</strong>，加水 <strong>${w[0]} ${w[1]}</strong>；浸湿布巾包裹消杀</p>`;
    }
    if (totalArea > 0) {
        let s = getUnitText(cacheRoom), w = getUnitText(cacheRoomW);
        //已修改：【室内消杀】→【室内消毒】
        html += `<p><span class="blue-title">【室内消毒】</span>作用浓度<span class="num-normal">${conc}mg/L</span>，地面${formatNum(groundArea)}㎡`;
        if (wallArea > 0) {
            html += `，墙面${formatNum(wallArea)}㎡，总面积${formatNum(totalArea)}㎡`;
        }
        html += `<br>原液 <strong>${s[0]} ${s[1]}</strong>，加水 <strong>${w[0]} ${w[1]}</strong>；喷洒消毒10分钟或擦拭消毒5分钟`;
        if (wallType !== 'none') {
            html += `。喷雾量根据墙面结构不同，以湿润不向下流水为度`;
        }
        html += `。</p>`;
    }

    document.getElementById('result').innerHTML = html;
}

function calcAll() {
    document.getElementById('tipInfo').style.display = 'none';

    const obj = document.getElementById('disinfectObj').value;
    const val = parseFloat(document.getElementById('inputVal').value) || 0;
    const L = parseFloat(document.getElementById('len').value) || 0;
    const W = parseFloat(document.getElementById('wid').value) || 0;
    const wallType = document.getElementById('wallType').value;
    const origPct = parseFloat(document.getElementById('origConc').value) || 5;
    const origMgL = origPct * 10000;
    let setConc = 0;

    cacheSputum = cacheSputumW = 0;
    cacheFabric = cacheFabricW = 0;
    cacheTable = cacheTableW = 0;
    cacheClean = cacheCleanW = 0;
    cacheRub = cacheRubW = 0;
    cacheVomit = cacheVomitW = 0;
    cacheFeces = cacheFecesW = 0;
    cacheUrine = cacheUrineW = 0;
    cacheSewage = cacheSewageW = 0;
    cacheBody = cacheBodyW = 0;
    cacheRoom = cacheRoomW = 0;

    if(obj === 'sputum' || obj === 'vomit') setConc = 20000;
    else if(obj === 'feces') setConc = 50000;
    else if(obj === 'urine' || obj === 'bodyWater') setConc = 10000;
    else if(obj === 'rubWater') setConc = 2000;
    else if(obj === 'fabricWater' || obj === 'cleanWater') setConc = 1000;
    else if(obj === 'tablewareWater') setConc = 500;
    else if(obj === 'sewage') setConc = val>100 ? 100 : 200;
    else if(L>0 || W>0) setConc = parseFloat(document.getElementById('targetEnv').value);

    targetConc = setConc;

    if (obj === 'sputum' && val > 0) {
        let totalMl = val * 2;
        cacheSputum = origMgL ? (setConc * totalMl) / origMgL : 0;
        cacheSputumW = totalMl - cacheSputum;
    }
    if (obj === 'fabricWater' && val > 0) {
        let totalMl = val * 1000;
        cacheFabric = origMgL ? (setConc * totalMl) / origMgL : 0;
        cacheFabricW = totalMl - cacheFabric;
    }
    if (obj === 'tablewareWater' && val > 0) {
        let totalMl = val * 1000;
        cacheTable = origMgL ? (setConc * totalMl) / origMgL : 0;
        cacheTableW = totalMl - cacheTable;
    }
    if (obj === 'cleanWater' && val > 0) {
        let totalMl = val * 1000;
        cacheClean = origMgL ? (setConc * totalMl) / origMgL : 0;
        cacheCleanW = totalMl - cacheClean;
    }
    if (obj === 'rubWater' && val > 0) {
        let totalMl = val * 1000;
        cacheRub = origMgL ? (setConc * totalMl) / origMgL : 0;
        cacheRubW = totalMl - cacheRub;
    }
    if (obj === 'vomit' && val > 0) {
        let totalMl = val;
        cacheVomit = origMgL ? (setConc * totalMl) / origMgL : 0;
        cacheVomitW = totalMl - cacheVomit;
    }
    if (obj === 'feces' && val > 0) {
        let totalMl = val * 2;
        cacheFeces = origMgL ? (setConc * totalMl) / origMgL : 0;
        cacheFecesW = totalMl - cacheFeces;
    }
    if (obj === 'urine' && val > 0) {
        let totalMl = val * 10;
        cacheUrine = origMgL ? (setConc * totalMl) / origMgL : 0;
        cacheUrineW = totalMl - cacheUrine;
    }
    if (obj === 'sewage' && val > 0) {
        let totalMl = val * 1000;
        cacheSewage = origMgL ? (setConc * totalMl) / origMgL : 0;
        cacheSewageW = totalMl - cacheSewage;
    }
    if (obj === 'bodyWater' && val > 0) {
        let totalMl = val * 1000;
        cacheBody = origMgL ? (setConc * totalMl) / origMgL : 0;
        cacheBodyW = totalMl - cacheBody;
    }

    let groundDose = 200;
    if (obj === 'sputum' && val > 0) groundDose = 300;
    const wallH = wallType !== 'none' ? 2 : 0;
    const wallDoseText = document.getElementById('wallDose').value;
    const wallDosePer = parseFloat(wallDoseText.replace(/[^0-9.]/g, '')) || 100;
    const groundArea = L * W;
    const wallArea = wallH ? 2 * (L + W) * wallH : 0;
    const totalMl = groundArea * groundDose + wallArea * wallDosePer;
    if (totalMl > 0) {
        let roomConc = parseFloat(document.getElementById('targetEnv').value);
        targetConc = roomConc;
        cacheRoom = origMgL ? (roomConc * totalMl) / origMgL : 0;
        cacheRoomW = totalMl - cacheRoom;
    }

    renderAllResult();
}

function resetAll() {
    document.getElementById('tipInfo').style.display = 'block';

    document.getElementById('inputVal').value = '';
    document.getElementById('len').value = '';
    document.getElementById('wid').value = '';
    document.getElementById('origConc').value = 5;
    document.getElementById('targetEnv').value = 1000;
    document.getElementById('wallType').value = 'none';
    document.getElementById('wallType').dispatchEvent(new Event('change'));
    document.getElementById('result').innerHTML = '';
    document.getElementById('disinfectObj').value = 'sputum';
    document.getElementById('disinfectObj').dispatchEvent(new Event('change'));

    cacheSputum = cacheSputumW = 0;
    cacheFabric = cacheFabricW = 0;
    cacheTable = cacheTableW = 0;
    cacheClean = cacheCleanW = 0;
    cacheRub = cacheRubW = 0;
    cacheVomit = cacheVomitW = 0;
    cacheFeces = cacheFecesW = 0;
    cacheUrine = cacheUrineW = 0;
    cacheSewage = cacheSewageW = 0;
    cacheBody = cacheBodyW = 0;
    cacheRoom = cacheRoomW = 0;
    targetConc = 0;
}
</script>
</body>
</html>
